name: Reusable Release

on:
  workflow_call:
    inputs:
      target:
        required: true
        type: string
      runner: # Runner labels
        required: true
        type: string
      test-runner: # Test Runner labels
        required: false
        type: string
      profile: # Rust profile, "ci" or "production" or "profiling"
        default: 'ci'
        required: false
        type: string
      test: # Run tests?
        type: boolean
        required: false
        default: false
      ref: # Git reference to checkout
        required: false
        type: string
      binding_postfix: # Use when building multiple profiles in one workflow run; appends a postfix to the uploaded artifact name to distinguish each build.
        required: false
        type: string

env:
  # Opt JS actions into Node 24 ahead of GitHub's June 2026 default flip.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  GIT_CONFIG_COUNT: '1'
  GIT_CONFIG_KEY_0: 'init.defaultBranch'
  GIT_CONFIG_VALUE_0: 'main'

permissions:
  # Allow commenting on issues
  issues: write

jobs:
  build:
    uses: ./.github/workflows/reusable-build-build.yml
    with:
      target: ${{ inputs.target }}
      runner: ${{ inputs.runner }}
      profile: ${{ inputs.profile }}
      ref: ${{ inputs.ref }}
      binding_postfix: ${{ inputs.binding_postfix }}
  test:
    if: inputs.test
    needs: build
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      target: ${{ inputs.target }}
      runner: ${{ inputs.test-runner || inputs.runner }}
      ref: ${{ inputs.ref }}
